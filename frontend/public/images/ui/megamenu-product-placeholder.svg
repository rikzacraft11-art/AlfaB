<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="560" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8f7f5"/>
      <stop offset="100%" stop-color="#f0ede8"/>
    </linearGradient>
    <linearGradient id="bottle1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#8b6d3f"/>
    </linearGradient>
    <linearGradient id="bottle2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e0d4"/>
      <stop offset="100%" stop-color="#c4b8a6"/>
    </linearGradient>
    <linearGradient id="bottle3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d3428"/>
      <stop offset="100%" stop-color="#1e1a14"/>
    </linearGradient>
    <linearGradient id="bottle4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c5a9"/>
      <stop offset="100%" stop-color="#a89674"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="560" height="240" rx="8" fill="url(#bg)"/>
  
  <!-- Bottle 1 - Tall gold -->
  <g transform="translate(100, 30)">
    <rect x="18" y="0" width="14" height="20" rx="3" fill="#8b6d3f"/>
    <rect x="10" y="18" width="30" height="160" rx="6" fill="url(#bottle1)"/>
    <rect x="14" y="60" width="22" height="40" rx="2" fill="white" fill-opacity="0.15"/>
    <ellipse cx="25" cy="178" rx="15" ry="3" fill="rgba(0,0,0,0.05)"/>
  </g>
  
  <!-- Bottle 2 - Medium cream -->
  <g transform="translate(195, 50)">
    <rect x="16" y="0" width="18" height="16" rx="3" fill="#b0a48e"/>
    <rect x="8" y="14" width="34" height="130" rx="8" fill="url(#bottle2)"/>
    <rect x="12" y="45" width="26" height="35" rx="2" fill="white" fill-opacity="0.2"/>
    <ellipse cx="25" cy="144" rx="17" ry="3" fill="rgba(0,0,0,0.05)"/>
  </g>
  
  <!-- Bottle 3 - Dark short -->
  <g transform="translate(290, 70)">
    <rect x="14" y="0" width="12" height="14" rx="2" fill="#1e1a14"/>
    <rect x="6" y="12" width="28" height="100" rx="5" fill="url(#bottle3)"/>
    <rect x="10" y="35" width="20" height="25" rx="2" fill="white" fill-opacity="0.1"/>
    <ellipse cx="20" cy="112" rx="14" ry="3" fill="rgba(0,0,0,0.05)"/>
  </g>
  
  <!-- Bottle 4 - Wide pump -->
  <g transform="translate(375, 40)">
    <rect x="22" y="0" width="6" height="30" rx="2" fill="#8b7d5e"/>
    <rect x="12" y="6" width="26" height="4" rx="2" fill="#8b7d5e"/>
    <rect x="6" y="28" width="38" height="140" rx="7" fill="url(#bottle4)"/>
    <rect x="10" y="55" width="30" height="40" rx="3" fill="white" fill-opacity="0.15"/>
    <ellipse cx="25" cy="168" rx="19" ry="3" fill="rgba(0,0,0,0.05)"/>
  </g>
  
  <!-- Subtle shadow line -->
  <line x1="60" y1="210" x2="500" y2="210" stroke="rgba(0,0,0,0.03)" stroke-width="2"/>
</svg>
